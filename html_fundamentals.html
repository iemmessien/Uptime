<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tables & Forms</title>
</head>

<body>

    <caption>List of Students</caption>
    <thead>

        <th scope="col">Name</th>
        <th scope="col">Gender</th>
        <th scope="col">Phone</th>
        <th scope="col">Email</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th scope="row">Emmanuel</th>
        <td>Male</td>
        <td>0802277904</td>
        <td>admin@app.com</td>
      </tr>
      <tr>
        <th scope="row">John</th>
        <td>Male</td>
        <td>09073800582</td>
        <td>tech@company.com</td>
      </tr>
      <tr>
        <th scope="row">Michael</th>
        <td>Male</td>
        <td>08040285023</td>
        <td>mike@mikool.com</td>
      </tr>
      <tr>
        <th scope="row">Jonathan</th>
        <td>Male</td>
        <td>07094028424</td>
        <td>jon@freenom.com</td>
      </tr>
    </tbody>
    <tfoot>
      <tr>
        <th scope="row" colspan="4">Total:</th>

        <td>4 Students</td>

  </table>

  <hr>

  <img src="public/images/tpsl-logo.jpeg" alt="TPSL Logo" title="TPSL Logo" loading="lazy" width="120">
  
  <hr>

  <h1>Create Your Account</h1>
  <form action="/register" method="POST">
    <fieldset>
      <legend>Personal Details</legend>

      <label for="first-name">First Name:</label>
      <input type="text" id="first-name" name="first-name" required><br><br>

      <label>Last Name:</label>
      <input type="text" id="last-name" name="last-name" required><br><br>

      <label for="date-of-birth">Date of Birth:</label>
      <input type="date" id="date-of-birth" name="date-of-birth"><br><br>
    </fieldset><br>

    <fieldset>
      <legend>Account Details</legend>

      <label for="email">Email Address:</label>
      <input type="email" id="email" name="email" required><br><br>

      <label for="pass">Password:</label>
      <input type="password" id="pass" name="pass" minlength="8" required><br><br>

      <label for="select-course">Select Course:</label>
      <select id="select-course" name="select-course">
        <optgroup label="Frontend"> Frontend
          <option>HTML Fundamentals</option>
          <option>CSS Styling</option>
          <option>JavaScript</option>
        </optgroup>
        <optgroup label="Backend"> Backend
          <option>PHP</option>
          <option>Python</option>
          <option>Node.js</option>
        </optgroup>
      </select><br>
    </fieldset><br>

    <label>
      <input type="checkbox" name="agree" required>I agree to the Terms and Conditions
    </label><br><br>

    <button type="submit">Create Account</button>
    <button type="reset">Clear</button>
  </form>

</body>


</html>
